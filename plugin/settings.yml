---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
polling_url: "{%- if item_types.size > 0 -%}{%- assign idx = trmnl.system.timestamp_utc | modulo: item_types.size -%}{%- assign selected = item_types[idx] -%}{%- else -%}{%- assign all_types = 'agents,base_weapons,collectibles,collections,crates,graffiti,highlights,keychains,keys,music_kits,patches,skins,stickers,stickers_slab,tools' | split: ',' -%}{%- assign idx = trmnl.system.timestamp_utc | modulo: all_types.size -%}{%- assign selected = all_types[idx] -%}{%- endif -%}https://raw.githubusercontent.com/ByMykel/CSGO-API/refs/heads/main/public/api/en/{{selected}}.json"
polling_headers: ''
polling_body: ''
id: 180810
custom_fields:
- keyname: about
  name: About This Plugin
  field_type: author_bio
  category: games
  github_url: https://github.com/ExcuseMi/trmnl-counterstrike-2-showcase-plugin
  description: Showcase every available item in Counter-Strike 2, including skins, crates, collectibles, music kits, and more.
  help_text: TRMNL X Ready
- keyname: item_types
  field_type: select
  name: Item Types to Display
  description: Select all the item types you want to display.
  options:
  - Agents: agents
  - Base Weapons: base_weapons
  - Collectibles: collectibles
  - Collections: collections
  - Crates: crates
  - Graffiti: graffiti
  - Highlights: highlights
  - Keychains: keychains
  - Keys: keys
  - Music Kits: music_kits
  - Patches: patches
  - Skins: skins
  - Stickers: stickers
  - Sticker Slabs: stickers_slab
  - Tools: tools
  multiple: true
  help_text: Use <kbd>⌘</kbd>+<kbd>click</kbd> or <kbd>Ctrl</kbd>+<kbd>click</kbd> to select multiple item types.<br />Leave empty to show all item types.
name: Counter-Strike 2 Item Showcase
refresh_interval: 60
